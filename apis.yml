aid: listennotes
url: https://raw.githubusercontent.com/api-evangelist/listennotes/refs/heads/main/apis.yml
name: Listen Notes
kind: company
description: Listen Notes runs the largest podcast search engine and database, and
  exposes it as the Listen API - a simple, no-nonsense podcast search, directory, and
  insights REST API. It lets developers full-text search millions of podcasts and
  episodes by people, places, and topics; fetch podcast and episode metadata; browse
  best-podcasts charts, curated lists, and genres; retrieve podcast/episode
  recommendations; power typeahead autocomplete; and pull audience demographics and
  publisher-domain insights. The API is served at
  https://listen-api.listennotes.com/api/v2 and authenticated with an X-ListenAPI-Key
  header, with FREE, PRO, and ENTERPRISE plans billed on a request basis.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Podcasts
- Podcast Search
- Podcast Directory
- Search
- Audio
- Media
- Podcast Insights
created: '2026-07-03'
modified: '2026-07-03'
