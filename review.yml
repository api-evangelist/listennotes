    - GET    https://listen-api.listennotes.com/api/v2/typeahead
    - GET    https://listen-api.listennotes.com/api/v2/search_episode_titles
    - GET    https://listen-api.listennotes.com/api/v2/trending_searches
    - GET    https://listen-api.listennotes.com/api/v2/related_searches
    - GET    https://listen-api.listennotes.com/api/v2/spellcheck
    - GET    https://listen-api.listennotes.com/api/v2/best_podcasts
    - GET    https://listen-api.listennotes.com/api/v2/podcasts/{id}
    - DELETE https://listen-api.listennotes.com/api/v2/podcasts/{id}
    - POST   https://listen-api.listennotes.com/api/v2/podcasts
    - GET    https://listen-api.listennotes.com/api/v2/episodes/{id}
    - POST   https://listen-api.listennotes.com/api/v2/episodes
    - GET    https://listen-api.listennotes.com/api/v2/curated_podcasts
    - GET    https://listen-api.listennotes.com/api/v2/curated_podcasts/{id}
    - GET    https://listen-api.listennotes.com/api/v2/genres
    - GET    https://listen-api.listennotes.com/api/v2/regions
    - GET    https://listen-api.listennotes.com/api/v2/languages
    - GET    https://listen-api.listennotes.com/api/v2/just_listen
    - GET    https://listen-api.listennotes.com/api/v2/podcasts/{id}/recommendations
    - GET    https://listen-api.listennotes.com/api/v2/episodes/{id}/recommendations
