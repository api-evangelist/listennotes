  endpointsModeled: []
sources:
  - url: https://www.listennotes.com/api/docs/
    type: Documentation
    note: Official Listen API documentation. All REST; X-ListenAPI-Key header auth. No WebSocket mentioned.
  - url: https://listen-api.listennotes.com/api/v2/openapi.yaml
    type: OpenAPI
    note: Official OpenAPI 3.1.0 spec. 26 REST paths across Search, Directory, Playlist, Podcaster, and Insights tags. No callbacks or WebSocket.
  - url: https://www.listennotes.com/api/pricing/
    type: Pricing
    note: FREE / PRO / ENTERPRISE request-based plans; PRO rate limits ~2 req/s and 20 req/min; search-depth caps 30 / 300 / 10000.
  - url: https://www.listennotes.com/api/
    type: ProductPage
    note: The Best Podcast API for Search, Directory, and Insights.
  - url: https://github.com/ListenNotes
    type: SourceCode
    note: Open-source client SDKs and code samples; the API and database themselves are proprietary and hosted.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. The Listen API is entirely
    request/response REST over HTTPS, authenticated with the X-ListenAPI-Key
    header. No AsyncAPI document was created because there is no server-push
    transport on Listen Notes' own API to model.
