meters:
- name: api_requests
  description: Billable API requests across all endpoints, counted against the plan allowance and metered as overage on PRO.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - plan
  - endpoint
- name: pro_base_fee
  description: Flat monthly subscription fee for the PRO plan.
  unit: months
  aggregation: sum
  dimensions:
  - account
- name: overage_requests
  description: Requests beyond the included PRO allowance, billed per additional 1,000.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track request volume per endpoint and per plan against the monthly allowance to see how close usage is to overage or suspension.
- name: Allocation
  description: Attribute request volume to the product feature or team that triggers it (search, directory lookups, insights) so cost maps to internal owners.
- name: Optimization
  description: Cache podcast/episode metadata and search results where terms permit, batch fetches via POST /podcasts and POST /episodes, and use typeahead sparingly to cut billable requests; pick the plan whose included allowance matches steady demand.
- name: Accountability
  description: Assign an owner for the Listen API key, review monthly request volume against the allowance, and right-size the plan (FREE, PRO, ENTERPRISE) as demand grows.
