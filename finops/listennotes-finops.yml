description: >-
  FinOps view of Listen API spend. The Listen API is billed on a request basis
  across three plans: a FREE plan with a fixed monthly request allowance (no
  invoice), a PRO plan with a flat monthly base fee, an included request
  allowance, and metered overage priced per additional 1,000 requests, and a
  custom ENTERPRISE plan billed annually with negotiated volume. The primary cost
  driver is API request volume, so cost control centers on minimizing and caching
  requests and choosing the plan whose included allowance best fits steady-state
  demand.
notes: >-
  Per-unit rates reflect the public pricing page at the time of research and can
  change - verify at https://www.listennotes.com/api/pricing/ during
  reconciliation. ENTERPRISE permits server-side caching, which is the main lever
  for reducing billable request volume.
